name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lua lint (stylua + luacheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: stylua --check
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 2.0.2
          args: --check nvim/

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: luacheck
        run: luacheck nvim/lua

  load:
    name: Headless load test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (stable)
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install plugins and check the config loads
        run: |
          set -euo pipefail
          # Usar la config del repo como si fuera ~/.config/nvim
          export XDG_CONFIG_HOME="$GITHUB_WORKSPACE/.ci-config"
          export XDG_DATA_HOME="$GITHUB_WORKSPACE/.ci-data"
          mkdir -p "$XDG_CONFIG_HOME" "$XDG_DATA_HOME"
          ln -sfn "$GITHUB_WORKSPACE/nvim" "$XDG_CONFIG_HOME/nvim"

          # Patron de errores reales de Lua/Neovim. Excluimos el ruido benigno
          # (progreso de descarga de parsers de Treesitter, etc.).
          err_re='E[0-9]+:|Error|stack traceback|\.lua:[0-9]+:'

          check() {
            # $1 = descripcion, resto = comando nvim.
            local desc="$1"; shift
            local out
            out="$("$@" 2>&1 || true)"
            if printf '%s\n' "$out" | grep -Eq "$err_re"; then
              echo "ERROR real durante: $desc"
              printf '%s\n' "$out"
              exit 1
            fi
          }

          # 1) Instalar plugins (bloqueante). Aqui la spec manda: treesitter
          #    se instala desde la rama "master" al no estar fijado en el lock.
          check "Lazy sync" nvim --headless "+Lazy! sync" +qa

          # 2) Abrir un archivo real para disparar los plugins por evento
          #    (treesitter, conform, gitsigns...) y cazar errores reales de config.
          printf 'local x = 1\nprint(x)\n' > sample.lua
          check "apertura de sample.lua" nvim --headless sample.lua +qa

          echo "La config carga sin errores."
