name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lua lint (stylua + luacheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: stylua --check
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 2.0.2
          args: --check nvim/

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: luacheck
        run: luacheck nvim/lua

  load:
    name: Headless load test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (stable)
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install plugins and verify the config loads
        run: |
          set -euo pipefail

          # Usamos el repo como si fuera ~/.config/nvim, en directorios aislados.
          export XDG_CONFIG_HOME="$GITHUB_WORKSPACE/.ci-config"
          export XDG_DATA_HOME="$GITHUB_WORKSPACE/.ci-data"
          export XDG_STATE_HOME="$GITHUB_WORKSPACE/.ci-state"
          mkdir -p "$XDG_CONFIG_HOME" "$XDG_DATA_HOME" "$XDG_STATE_HOME"
          ln -sfn "$GITHUB_WORKSPACE/nvim" "$XDG_CONFIG_HOME/nvim"

          # 1) Instalar/actualizar plugins de forma bloqueante (patron oficial de
          #    LazyVim para CI). Si Neovim termina con error, el paso falla.
          nvim --headless "+Lazy! sync" +qa

          # 2) Verificar que la config carga de verdad: LazyVim con plugins
          #    cargados y nuestra capa de preferencias legible. Salimos con codigo
          #    de error (cquit) solo ante un fallo real, sin filtrar por texto
          #    (el filtro anterior daba falsos positivos con salida benigna).
          nvim --headless \
            "+lua local ok_cfg, cfg = pcall(require, 'lazy.core.config'); local ok_prefs, prefs = pcall(require, 'sceptic.prefs'); if not (ok_cfg and ok_prefs and cfg.plugins and next(cfg.plugins) ~= nil and type(prefs) == 'table' and prefs.theme) then vim.cmd('cquit 1') end" \
            +qa

          echo "La config carga correctamente."
